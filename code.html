<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>React Wallet - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#1a120e",
              "card-dark": "#2a1d17",
              "input-dark": "#36261e",
            },
            fontFamily: {
              display: ["Public Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Public Sans", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-6 text-slate-900 dark:text-slate-100 transition-colors duration-300"
  >
    <!-- Main App Container -->
    <div
      class="max-w-4xl w-full bg-white dark:bg-card-dark rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-primary/10"
    >
      <!-- Header Section -->

      <!-- Main Content Grid -->
      <div
        class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-t border-slate-100 dark:border-primary/10 dark:divide-primary/10"
      >
        <!-- Left Column: Transaction Form -->
        <section class="p-8">
          <h3
            class="text-lg font-bold mb-6 text-slate-800 dark:text-white flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-primary text-xl"
              >add_circle</span
            >
            Nueva Transacción
          </h3>
          <form class="space-y-5" onsubmit="return false;">
            <div class="flex flex-col gap-1.5">
              <label
                class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1"
                >Concepto</label
              >
              <input
                class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-input-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                placeholder="Ej. Alquiler"
                type="text"
              />
            </div>
            <div class="flex flex-col gap-1.5">
              <label
                class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1"
                >Monto</label
              >
              <div class="relative">
                <span
                  class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-bold"
                  >$</span
                >
                <input
                  class="w-full h-12 pl-8 pr-4 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-input-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                  placeholder="0.00"
                  type="number"
                />
              </div>
              <p
                class="text-[10px] text-slate-400 dark:text-slate-500 mt-1 italic"
              >
                (Positivo = ingreso, negativo = gasto)
              </p>
            </div>
            <button
              class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 active:scale-[0.98]"
            >
              <span class="material-symbols-outlined">add</span>
              Agregar Transacción
            </button>
          </form>
        </section>
        <!-- Right Column: History List -->
        <section class="p-8">
          <h3
            class="text-lg font-bold mb-6 text-slate-800 dark:text-white flex items-center justify-between"
          >
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-primary text-xl"
                >history</span
              >
              Historial
            </div>
            <span class="text-xs font-normal text-slate-400 dark:text-slate-500"
              >Últimos movimientos</span
            >
          </h3>
          <div class="space-y-3">
            <!-- Item 1: Income -->
            <div
              class="group relative flex items-center justify-between p-4 bg-slate-50 dark:bg-primary/5 rounded-lg border-l-4 border-emerald-500 hover:bg-slate-100 dark:hover:bg-primary/10 transition-all"
            >
              <div class="flex flex-col">
                <span
                  class="text-sm font-bold text-slate-800 dark:text-slate-200"
                  >Pago Nómina</span
                >
                <span
                  class="text-[10px] text-slate-400 uppercase tracking-wider"
                  >Hoy, 09:00 AM</span
                >
              </div>
              <div class="flex items-center gap-4">
                <span class="text-emerald-500 font-black tracking-tight"
                  >+$500.00</span
                >
                <button
                  class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 hover:bg-rose-500 hover:text-white transition-colors opacity-0 group-hover:opacity-100"
                >
                  <span class="material-symbols-outlined text-sm">close</span>
                </button>
              </div>
            </div>
            <!-- Item 2: Expense -->
            <div
              class="group relative flex items-center justify-between p-4 bg-slate-50 dark:bg-primary/5 rounded-lg border-l-4 border-rose-500 hover:bg-slate-100 dark:hover:bg-primary/10 transition-all"
            >
              <div class="flex flex-col">
                <span
                  class="text-sm font-bold text-slate-800 dark:text-slate-200"
                  >Compra Pizza</span
                >
                <span
                  class="text-[10px] text-slate-400 uppercase tracking-wider"
                  >Ayer, 08:30 PM</span
                >
              </div>
              <div class="flex items-center gap-4">
                <span class="text-rose-500 font-black tracking-tight"
                  >-$20.00</span
                >
                <button
                  class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 hover:bg-rose-500 hover:text-white transition-colors opacity-0 group-hover:opacity-100"
                >
                  <span class="material-symbols-outlined text-sm">close</span>
                </button>
              </div>
            </div>
            <!-- Empty State Placeholder (Visual hint) -->
            <div
              class="border-2 border-dashed border-slate-100 dark:border-primary/5 rounded-lg p-8 flex flex-col items-center justify-center text-slate-300 dark:text-slate-700"
            >
              <span class="material-symbols-outlined text-3xl mb-1"
                >receipt_long</span
              >
              <p class="text-xs">No hay más transacciones</p>
            </div>
          </div>
        </section>
      </div>
      <!-- Footer / Stats -->
      <footer class="px-8 py-4 bg-slate-50 dark:bg-primary/5 text-center">
        <p
          class="text-[10px] text-slate-400 dark:text-slate-500 font-medium uppercase tracking-widest"
        >
          React Wallet • Desktop Edition • 2024
        </p>
      </footer>
    </div>
    <!-- Theme Toggle (Bonus functionality visual) -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3">
      <button
        class="w-12 h-12 bg-white dark:bg-card-dark rounded-full shadow-lg flex items-center justify-center text-slate-500 dark:text-primary border border-slate-100 dark:border-primary/20 hover:scale-110 transition-transform"
        onclick="document.documentElement.classList.toggle('dark')"
      >
        <span class="material-symbols-outlined">dark_mode</span>
      </button>
    </div>
  </body>
</html>
